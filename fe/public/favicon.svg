<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Pink background -->
  <rect width="48" height="48" rx="10" fill="#F9A8D4"/>
  <!-- Left cheek -->
  <circle cx="8" cy="36" r="5" fill="#F472B6" opacity="0.5"/>
  <!-- Right cheek -->
  <circle cx="40" cy="36" r="5" fill="#F472B6" opacity="0.5"/>
  <!-- Left eye -->
  <circle cx="15" cy="22" r="9" fill="#1a1a2e"/>
  <!-- Left eye highlight big -->
  <circle cx="12.5" cy="19" r="3.5" fill="#fff"/>
  <!-- Left eye highlight small -->
  <circle cx="17" cy="23" r="1.5" fill="#fff"/>
  <!-- Left eye purple reflection -->
  <ellipse cx="14" cy="27" rx="4" ry="2" fill="#C4B5FD" opacity="0.8"/>
  <!-- Right eye -->
  <circle cx="33" cy="22" r="9" fill="#1a1a2e"/>
  <!-- Right eye highlight big -->
  <circle cx="30.5" cy="19" r="3.5" fill="#fff"/>
  <!-- Right eye highlight small -->
  <circle cx="35" cy="23" r="1.5" fill="#fff"/>
  <!-- Right eye purple reflection -->
  <ellipse cx="32" cy="27" rx="4" ry="2" fill="#C4B5FD" opacity="0.8"/>
  <!-- Smile -->
  <path d="M20 33 Q24 37 28 33" stroke="#1a1a2e" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Sparkle top-right -->
  <path d="M40 8 L41 5 L42 8 L45 9 L42 10 L41 13 L40 10 L37 9 Z" fill="#FDE68A"/>
  <!-- Sparkle small -->
  <path d="M37 4 L37.5 2.5 L38 4 L39.5 4.5 L38 5 L37.5 6.5 L37 5 L35.5 4.5 Z" fill="#FDE68A"/>
</svg>